name: Auto Update IBS Special Movies

on:
  push:
    branches:
      - 'M3u8'    # এই ব্রাঞ্চে কোনো পরিবর্তন করলেই রান হবে
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর
  workflow_dispatch:      # ম্যানুয়ালি রান করার বাটন

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: 'M3u8' # সরাসরি আপনার M3u8 ব্রাঞ্চটি সিলেক্ট করা হয়েছে

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests pytz

      - name: Run Movie Scraper
        run: python movie_script.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "IBS TV special.m3u"
          git commit -m "Automated Movie Update: $(date)" || exit 0
          git push origin M3u8
          
